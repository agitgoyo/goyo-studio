<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고요스튜디오 강의 신청</title>

  <style>
    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: #f6f3ee;
      color: #1f1f1f;
    }

    .apply-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
    }

    .apply-card {
      width: 100%;
      max-width: 720px;
      background: #fff;
      border-radius: 28px;
      padding: 48px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    .apply-label {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eee7dc;
      font-size: 13px;
      letter-spacing: -0.02em;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.25;
      letter-spacing: -0.04em;
    }

    .description {
      margin: 0 0 36px;
      color: #666;
      font-size: 16px;
      line-height: 1.7;
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd6cc;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      font-family: inherit;
      background: #faf8f5;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #1f1f1f;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .submit-button {
      width: 100%;
      margin-top: 12px;
      border: none;
      border-radius: 999px;
      padding: 18px 24px;
      background: #1f1f1f;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .submit-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .notice {
      margin-top: 18px;
      color: #777;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .success-message {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border-radius: 18px;
      background: #f0eadf;
      font-size: 15px;
      line-height: 1.7;
      text-align: center;
    }

    iframe {
      display: none;
    }

    @media (max-width: 640px) {
      .apply-card {
        padding: 32px 22px;
        border-radius: 22px;
      }

      h1 {
        font-size: 28px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="apply-page">
    <section class="apply-card">
      <span class="apply-label">GOYO STUDIO CLASS</span>

      <h1>강의 신청</h1>

      <p class="description">
        아래 정보를 작성해주시면 신청 내용을 확인한 뒤 개별 연락드립니다.
        소수 정예로 진행되는 강의라 신청 후 승인 및 결제 안내가 순차적으로 진행됩니다.
      </p>

      <form 
        id="applyForm"
        action="https://script.google.com/macros/s/AKfycbxujdDp6MxnFDPCL1rEncsC97OT6yzqPMB8ke2y7J3ycKz_2K617TUejaTmyvUYVoiY/exec"
        method="POST"
        target="hidden_iframe"
      >
        <div class="form-row">
          <div class="form-group">
            <label for="name">이름 *</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="form-group">
            <label for="phone">연락처 *</label>
            <input type="text" id="phone" name="phone" required placeholder="010-0000-0000" />
          </div>
        </div>

        <div class="form-group">
          <label for="email">이메일 *</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="classType">신청 강의 *</label>
            <select id="classType" name="classType" required>
              <option value="">강의를 선택해주세요</option>
              <option value="SketchUp 기초반">SketchUp 기초반</option>
              <option value="D5 Render 기초반">D5 Render 기초반</option>
              <option value="D5 Render 중급반">D5 Render 중급반</option>
              <option value="1:1 개인강의">1:1 개인강의</option>
            </select>
          </div>

          <div class="form-group">
            <label for="job">현재 상태</label>
            <select id="job" name="job">
              <option value="">선택해주세요</option>
              <option value="학생">학생</option>
              <option value="취준생">취준생</option>
              <option value="실무자">실무자</option>
              <option value="프리랜서">프리랜서</option>
              <option value="기타">기타</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="level">프로그램 사용 경험</label>
          <select id="level" name="level">
            <option value="">선택해주세요</option>
            <option value="처음 사용">처음 사용</option>
            <option value="기초 사용 가능">기초 사용 가능</option>
            <option value="어느 정도 사용 가능">어느 정도 사용 가능</option>
            <option value="실무에서 사용 중">실무에서 사용 중</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">궁금한 점 / 배우고 싶은 내용</label>
          <textarea id="message" name="message" placeholder="강의를 통해 배우고 싶은 내용이나 현재 어려운 점을 적어주세요."></textarea>
        </div>

        <button type="submit" class="submit-button">
          신청서 제출하기
        </button>

        <p class="notice">
          제출 후 신청 내용을 검토한 뒤 승인 및 결제 안내를 개별적으로 보내드립니다.
        </p>
      </form>

      <div id="successMessage" class="success-message">
        신청서가 제출되었습니다.<br />
        확인 후 개별 연락드릴게요. 감사합니다.
      </div>

      <iframe name="hidden_iframe" id="hidden_iframe"></iframe>
    </section>
  </main>

  <script>
    const form = document.getElementById("applyForm");
    const successMessage = document.getElementById("successMessage");
    const hiddenIframe = document.getElementById("hidden_iframe");

    let submitted = false;

    form.addEventListener("submit", function () {
      submitted = true;

      const button = form.querySelector(".submit-button");
      button.textContent = "제출 중입니다...";
      button.disabled = true;
    });

    hiddenIframe.addEventListener("load", function () {
      if (submitted) {
        form.style.display = "none";
        successMessage.style.display = "block";
      }
    });
  </script>
</body>
</html>
